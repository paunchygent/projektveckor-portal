# .pre-commit-config.yaml
# See https://pre-commit.com for more information.

repos:
  - repo: local
    hooks:
      - id: validate-skill-frontmatter
        name: Validate skill frontmatter (name + description)
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && pdm run validate-skills'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
